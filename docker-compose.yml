# ═══════════════════════════════════════════════════════════════════════════
#  InfraWatch — Docker Compose Stack
#  Services: TimescaleDB, Kafka + Zookeeper, Backend (FastAPI), Frontend
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: infrawatch-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 2181 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  # ── Kafka Broker ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: infrawatch-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for internal Docker traffic, one for host access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days retention
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 4
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ── TimescaleDB (PostgreSQL) ────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: infrawatch-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: infrawatch
      POSTGRES_PASSWORD: infrawatch_secret
      POSTGRES_DB: infrawatch
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U infrawatch -d infrawatch" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrawatch-backend
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # MongoDB (Atlas or local)
      MONGO_URI: ${MONGO_URI:-mongodb://localhost:27017}
      MONGO_DB: ${MONGO_DB:-infrawatch}
      # Kafka
      USE_KAFKA: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # ML
      STUB_MODE: ${STUB_MODE:-false}
      RISK_THRESHOLD: ${RISK_THRESHOLD:-75.0}
      # n8n
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
      - ./ml:/app/../ml
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── React Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infrawatch-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

  # ── Kafka Producer (sensor simulator) ───────────────────────────────────
  sensor-producer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrawatch-sensor-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    working_dir: /app
    command: python -m stream.kafka_producer
    restart: unless-stopped

volumes:
  zookeeper_data:
  kafka_data:
  postgres_data:
